name: Prek checks

on:
  pull_request:
    branches:
      - main

# 同一个 PR 同时只允许一个 prek run，新的会取消旧的
# 这样解决 GitHub 为同一 commit 创建多个 check suite（push + pull_request）导致 prek 跑两次的问题
concurrency:
  group: prek-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Build embedded frontend assets
        run: bun run build:embedded
        working-directory: web
        env:
          NODE_ENV: production

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: prek
        uses: j178/prek-action@v2
        env:
          ELIZABETH_SKIP_WEB_BUILD: "1"
