name: Docker Publish

# 纯手动触发 — Docker 镜像发布由人工决策，不随每次 version bump 自动触发
#
# 使用方式（CLI）：
#   gh workflow run docker-publish.yml \
#     --repo YuniqueUnic/elizabeth \
#     -f version=v0.3.1 \
#     -f push_latest=true
#
# 或在 GitHub Actions UI：Actions → Docker Publish → Run workflow
on:
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本 tag（如 v0.3.1），必须是已存在的 git tag"
        required: true
        type: string
      push_latest:
        description: "同时更新 latest tag"
        required: false
        type: boolean
        default: true

permissions: {}

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/elizabeth

jobs:
  # ============================================================
  # Job 0: 验证输入的版本 tag 真实存在
  # ============================================================
  validate:
    name: Validate version tag
    runs-on: ubuntu-latest
    if: github.repository_owner == 'yuniqueunic'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! git tag --list | grep -qx "$VERSION"; then
            echo "❌ Tag '$VERSION' does not exist in this repository."
            echo "   Please create the tag first or check the spelling."
            git tag --list | sort -V | tail -10
            exit 1
          fi
          echo "✅ Tag '$VERSION' exists."

  # ============================================================
  # Job 1: 构建并推送镜像
  # ============================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout at version tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # 精确版本：v0.3.1 → 0.3.1
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            # minor 版本：0.3
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            # latest（由 push_latest 控制）
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest == 'true' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend


  update-description:
    name: Update Docker Hub Description
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Update description
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/elizabeth
          readme-filepath: ./README.en.md
          short-description: "Elizabeth is a modern, room-centric file sharing and collaboration platform built with Rust+Next.js"
