name: Docker Publish

# 纯手动触发 — Docker 镜像发布由人工决策，不随每次 version bump 自动触发
#
# 使用方式（CLI）：
#   gh workflow run docker-publish.yml \
#     --repo YuniqueUnic/elizabeth \
#     -f version=v0.3.1 \
#     -f push_latest=true
#
# 或在 GitHub Actions UI：Actions → Docker Publish → Run workflow
on:
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本 tag（如 v0.3.1），必须是已存在的 git tag"
        required: true
        type: string
      push_latest:
        description: "同时更新 latest tag"
        required: false
        type: boolean
        default: true

permissions: {}

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/elizabeth

jobs:
  # ============================================================
  # Job 0: 验证输入的版本 tag 真实存在
  # ============================================================
  validate:
    name: Validate version tag
    runs-on: ubuntu-latest
    if: github.repository_owner == 'yuniqueunic'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! git tag --list | grep -qx "$VERSION"; then
            echo "❌ Tag '$VERSION' does not exist in this repository."
            echo "   Please create the tag first or check the spelling."
            git tag --list | sort -V | tail -10
            exit 1
          fi
          echo "✅ Tag '$VERSION' exists."

  # ============================================================
  # Job 1: 构建并推送镜像
  # ============================================================
  build:
    name: Build platform
    runs-on: ${{ matrix.runner }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout at version tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================
  # Job 2: 合并 Manifest 并打上 Tag
  # ============================================================
  merge:
    name: Merge Manifests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # 精确版本：v0.3.1 → 0.3.1
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            # minor 版本：0.3
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            # latest（由 push_latest 控制）
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest == 'true' }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)
