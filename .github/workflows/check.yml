name: Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: check-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Build frontend (static export)
        run: bun run build:embedded
        working-directory: web
        env:
          NODE_ENV: production

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-assets
          path: crates/board/web-out
          retention-days: 1

  clippy:
    name: Clippy
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: crates/board/web-out

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        env:
          ELIZABETH_SKIP_WEB_BUILD: "1"

  test:
    name: Test
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: crates/board/web-out

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
        env:
          ELIZABETH_SKIP_WEB_BUILD: "1"

  try-publish:
    name: Try Publish
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: crates/board/web-out

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Force-track embedded assets for cargo publish
        run: git add -f crates/board/web-out/

      - name: Dry-run publish
        run: cargo publish --workspace --dry-run --allow-dirty
        env:
          ELIZABETH_SKIP_WEB_BUILD: "1"

  e2e:
    name: E2E Tests
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-assets
          path: crates/board/web-out

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile
        working-directory: web

      - name: Build backend
        run: cargo build -p elizabeth-board
        env:
          ELIZABETH_SKIP_WEB_BUILD: "1"

      - name: Start backend
        run: ./target/debug/board run &
        env:
          JWT_SECRET: ci-test-secret-at-least-32-characters-long # pragma: allowlist secret

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4092/api/v1/health && exit 0
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Run E2E tests
        run: npx playwright test --reporter=html,github
        working-directory: web

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7
