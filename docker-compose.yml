# ============================================================================
# Docker Compose configuration for Elizabeth
# ============================================================================
# Single-container deployment: Rust binary with embedded SPA frontend
# One port serves both the API backend and the static SPA frontend.
# ============================================================================

services:
  # ==========================================================================
  # Backend Service (Rust + Axum + Embedded Next.js SPA)
  # ==========================================================================
  # Single Rust binary serves:
  # - /api/v1/*       -> Backend API (Axum handlers)
  # - /api/v1/ws      -> WebSocket (real-time sync)
  # - /_next/*, etc.  -> Embedded SPA static assets (rust-embed)
  # - /*              -> SPA HTML fallback (index.html / _.html)
  backend:
    # x-release-please-start-version
    image: ${ELIZABETH_IMAGE:-yunique001/elizabeth:1.5.1}
    # x-release-please-end
    build:
      context: .
      dockerfile: Dockerfile.backend
      extra_hosts:
        - "index.crates.io=${CRATES_IO_INDEX_IPV4:-151.101.89.91}"
        - "static.crates.io=${CRATES_IO_STATIC_IPV4:-151.101.90.137}"
    container_name: elizabeth
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${BACKEND_PORT:-4092}:4092"
    volumes:
      # Data persistence
      - ${ELIZABETH_DATA_DIR:-./docker/backend/data}:/app/data
      - ${ELIZABETH_STORAGE_DIR:-./docker/backend/storage}:/app/storage
      # Configuration
      - ${ELIZABETH_BACKEND_CONFIG:-./docker/backend/config/backend.yaml}:/app/config/backend.yaml:ro
    environment:
      # Security
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production-min-32-chars}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-7200}
      JWT_LEEWAY_SECONDS: ${JWT_LEEWAY_SECONDS:-5}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-604800}
      JWT_CLEANUP_INTERVAL_SECONDS: ${JWT_CLEANUP_INTERVAL_SECONDS:-86400}
      JWT_ENABLE_REFRESH_TOKEN_ROTATION: ${JWT_ENABLE_REFRESH_TOKEN_ROTATION:-true}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: ${RUST_LOG:-info}
      # Database
      # Default: SQLite (file in /app/data)
      # Override in .env to switch to PostgreSQL, e.g.
      #   DATABASE_URL=postgresql://elizabeth:password@postgres:5432/elizabeth
      DATABASE_URL: ${DATABASE_URL:-sqlite:///app/data/elizabeth.db}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-1}
      # Room configuration
      ROOM_MAX_SIZE: ${ROOM_MAX_SIZE:-50MiB}
      ROOM_MAX_TIMES_ENTERED: ${ROOM_MAX_TIMES_ENTERED:-100}
      ROOM_ALLOWED_AGES: ${ROOM_ALLOWED_AGES:-1m,30m,2h,12h,1d,7d,30d,365d}
      ROOM_DEFAULT_AGE: ${ROOM_DEFAULT_AGE:-2h}
      ROOM_DEFAULT_PASSWORD: ${ROOM_DEFAULT_PASSWORD:-}
      ROOM_DEFAULT_PERMISSION_READ: ${ROOM_DEFAULT_PERMISSION_READ:-true}
      ROOM_DEFAULT_PERMISSION_EDIT: ${ROOM_DEFAULT_PERMISSION_EDIT:-true}
      ROOM_DEFAULT_PERMISSION_SHARE: ${ROOM_DEFAULT_PERMISSION_SHARE:-true}
      ROOM_DEFAULT_PERMISSION_DELETE: ${ROOM_DEFAULT_PERMISSION_DELETE:-true}
      ROOM_SHARE_DISABLED_LOCK_DURATION: ${ROOM_SHARE_DISABLED_LOCK_DURATION:-1h}
      GC_INTERVAL_SECONDS: ${GC_INTERVAL_SECONDS:-60}
      GC_BATCH_LIMIT: ${GC_BATCH_LIMIT:-200}
      UPLOAD_RESERVATION_TTL_SECONDS: ${UPLOAD_RESERVATION_TTL_SECONDS:-3600}
      # Middleware configuration
      MIDDLEWARE_TRACING_ENABLED: ${MIDDLEWARE_TRACING_ENABLED:-true}
      MIDDLEWARE_TRACING_LEVEL: ${MIDDLEWARE_TRACING_LEVEL:-info}
      MIDDLEWARE_TRACING_INCLUDE_HEADERS: ${MIDDLEWARE_TRACING_INCLUDE_HEADERS:-false}
      MIDDLEWARE_TRACING_INCLUDE_BODY: ${MIDDLEWARE_TRACING_INCLUDE_BODY:-false}
      MIDDLEWARE_REQUEST_ID_ENABLED: ${MIDDLEWARE_REQUEST_ID_ENABLED:-true}
      MIDDLEWARE_REQUEST_ID_HEADER_NAME: ${MIDDLEWARE_REQUEST_ID_HEADER_NAME:-X-Request-Id}
      MIDDLEWARE_REQUEST_ID_GENERATE_IF_MISSING: ${MIDDLEWARE_REQUEST_ID_GENERATE_IF_MISSING:-true}
      MIDDLEWARE_COMPRESSION_ENABLED: ${MIDDLEWARE_COMPRESSION_ENABLED:-true}
      MIDDLEWARE_COMPRESSION_MIN_CONTENT_LENGTH: ${MIDDLEWARE_COMPRESSION_MIN_CONTENT_LENGTH:-1024}
      MIDDLEWARE_CORS_ENABLED: ${MIDDLEWARE_CORS_ENABLED:-true}
      MIDDLEWARE_CORS_ALLOWED_ORIGINS: "${MIDDLEWARE_CORS_ALLOWED_ORIGINS:-*}"
      MIDDLEWARE_CORS_ALLOWED_METHODS: ${MIDDLEWARE_CORS_ALLOWED_METHODS:-GET,POST,PUT,DELETE,OPTIONS}
      MIDDLEWARE_CORS_ALLOWED_HEADERS: "${MIDDLEWARE_CORS_ALLOWED_HEADERS:-*}"
      MIDDLEWARE_CORS_ALLOW_CREDENTIALS: ${MIDDLEWARE_CORS_ALLOW_CREDENTIALS:-false}
      MIDDLEWARE_CORS_MAX_AGE: ${MIDDLEWARE_CORS_MAX_AGE:-3600}
      MIDDLEWARE_SECURITY_ENABLED: ${MIDDLEWARE_SECURITY_ENABLED:-true}
      MIDDLEWARE_SECURITY_CONTENT_TYPE_OPTIONS: ${MIDDLEWARE_SECURITY_CONTENT_TYPE_OPTIONS:-true}
      MIDDLEWARE_SECURITY_FRAME_OPTIONS: ${MIDDLEWARE_SECURITY_FRAME_OPTIONS:-DENY}
      MIDDLEWARE_SECURITY_XSS_PROTECTION: "${MIDDLEWARE_SECURITY_XSS_PROTECTION:-1; mode=block}"
      MIDDLEWARE_SECURITY_STRICT_TRANSPORT_SECURITY: "${MIDDLEWARE_SECURITY_STRICT_TRANSPORT_SECURITY:-max-age=31536000; includeSubDomains}"
      MIDDLEWARE_SECURITY_REFERRER_POLICY: ${MIDDLEWARE_SECURITY_REFERRER_POLICY:-strict-origin-when-cross-origin}
      MIDDLEWARE_RATE_LIMIT_ENABLED: ${MIDDLEWARE_RATE_LIMIT_ENABLED:-true}
      MIDDLEWARE_RATE_LIMIT_PER_SECOND: ${MIDDLEWARE_RATE_LIMIT_PER_SECOND:-20}
      MIDDLEWARE_RATE_LIMIT_BURST_SIZE: ${MIDDLEWARE_RATE_LIMIT_BURST_SIZE:-40}
      MIDDLEWARE_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS: ${MIDDLEWARE_RATE_LIMIT_CLEANUP_INTERVAL_SECONDS:-60}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4092/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
