# ============================================================================
# Docker Compose configuration for Elizabeth (Consolidated Monolithic Stack)
# ============================================================================
# File sharing and collaboration platform - Single Container Mode
# ============================================================================

services:
  # ==========================================================================
  # Elizabeth Monolithic Service (Rust + Frontend SPA Embedded)
  # ==========================================================================
  # Runs Axum server on port 4092 which serves both the REST APIs, WebSockets,
  # and Next.js static HTML/JS/CSS assets natively.
  # No Node.js or Nginx required in production.
  elizabeth:
    build:
      context: .
      dockerfile: Dockerfile.backend
      extra_hosts:
        - "index.crates.io=${CRATES_IO_INDEX_IPV4:-151.101.89.91}"
        - "static.crates.io=${CRATES_IO_STATIC_IPV4:-151.101.90.137}"
    container_name: elizabeth-service
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    # Direct port mapping: map host's 4001 port directly to backend's 4092 port
    ports:
      - "${FRONTEND_PORT:-4001}:4092"
    volumes:
      # Data persistence
      - ${ELIZABETH_DATA_DIR:-./docker/backend/data}:/app/data
      - ${ELIZABETH_STORAGE_DIR:-./docker/backend/storage}:/app/storage
      # Configuration
      - ${ELIZABETH_BACKEND_CONFIG:-./docker/backend/config/backend.yaml}:/app/config/backend.yaml:ro
    environment:
      # Security
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production-min-32-chars}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: ${RUST_LOG:-info}
      # Database
      # Default: SQLite (file in /app/data)
      # Override in .env to switch to PostgreSQL, e.g.
      #   DATABASE_URL=postgresql://elizabeth:password@postgres:5432/elizabeth
      DATABASE_URL: ${DATABASE_URL:-sqlite:///app/data/elizabeth.db}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      DB_MIN_CONNECTIONS: ${DB_MIN_CONNECTIONS:-1}
      # Room configuration
      ELIZABETH__APP__ROOM__SHARE_DISABLED_LOCK_DURATION: ${ROOM_SHARE_DISABLED_LOCK_DURATION:-3600}
    networks:
      - elizabeth-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4092/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ============================================================================
# Networks
# ============================================================================
networks:
  elizabeth-network:
    driver: bridge
